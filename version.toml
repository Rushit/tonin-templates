# tonin-templates version
# Used by tonin CLI to validate template compatibility

version = "0.4.0"
cli_min_version = "0.4.0"

# Template variants (see VARIANTS.md for details)
variants = ["flat", "default", "workspace"]

# Template structure
# variants/
#   ├── flat/          Minimal scaffold (proto + service)
#   ├── default/       Full scaffold (+ k8s, docker, CI)
#   └── workspace/     Monorepo with shared proto
# k8s/                 Kubernetes manifest templates
# Dockerfile.tmpl      Container image template
